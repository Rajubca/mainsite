{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - 500</title>
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <link href="{% static 'css/tailwind.css' %}" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #18181b; /* Dark zinc base */
            font-family: 'Inter', sans-serif;
            color: #f4f4f5;
        }

        /* Matrix/Grid Background Effect */
        .grid-bg {
            position: absolute;
            inset: -50%;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(239, 68, 68, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(239, 68, 68, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
            z-index: -2;
            opacity: 0.5;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px) translateZ(-200px); }
        }

        /* Pulsing Glow */
        .core-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(220,38,38,0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
            animation: corePulse 4s ease-in-out infinite alternate;
        }

        @keyframes corePulse {
            0% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.8); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
        }

        .text-glow {
            font-size: 12rem;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 2px #ef4444;
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
            animation: flicker 3s infinite;
        }

        @keyframes flicker {
            0%, 19.999%, 22%, 62.999%, 64%, 64.999%, 70%, 100% {
                text-shadow: 0 0 20px rgba(239,68,68,0.5), 0 0 40px rgba(239,68,68,0.3);
                opacity: 1;
            }
            20%, 21.999%, 63%, 63.999%, 65%, 69.999% {
                text-shadow: none;
                opacity: 0.4;
            }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-up {
            opacity: 0;
            animation: fadeInUp 1s ease-out forwards;
        }

        .btn-glow:hover {
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.8);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center relative">

    <!-- Background Effects -->
    <div class="grid-bg"></div>
    <div class="core-glow"></div>

    <!-- Content -->
    <div class="relative z-10 text-center px-4 max-w-2xl">
        <h1 class="text-glow mb-2">500</h1>

        <h2 class="text-4xl font-bold mb-6 text-red-500 fade-up" style="animation-delay: 0.3s;">
            Internal Server Error
        </h2>

        <p class="text-xl text-gray-400 mb-10 fade-up" style="animation-delay: 0.6s;">
            Our servers are experiencing a temporary hiccup. Our best minds are working on it.
        </p>

        <a href="{% url 'index' %}" class="inline-flex items-center px-8 py-4 text-lg font-bold text-white transition-all duration-300 ease-out bg-red-600 rounded-full btn-glow fade-up" style="animation-delay: 0.9s;">
            <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Return Home
        </a>
    </div>

</body>
</html>
