{% extends 'base.html' %}
{% load static %}

{% block title %}Server Error - 500{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex flex-col items-center justify-center text-center px-4 relative overflow-hidden">
    <div class="absolute inset-0 z-0 opacity-10 dark:opacity-20 pointer-events-none" style="background-image: radial-gradient(circle at 50% 50%, #ef4444 0%, transparent 50%); mix-blend-mode: color-burn;"></div>

    <div class="relative z-10">
        <h1 class="text-9xl font-bold text-gray-800 dark:text-gray-100 tracking-widest relative inline-block animate-glitch" data-text="500">
            500
        </h1>
    </div>

    <div class="mt-8 z-10">
        <h2 class="text-3xl font-semibold text-gray-700 dark:text-gray-300 mb-4 animate-fade-in-up">Internal Server Error</h2>
        <p class="text-lg text-gray-500 dark:text-gray-400 mb-8 max-w-md mx-auto animate-fade-in-up" style="animation-delay: 0.2s;">
            Our servers are experiencing a temporary hiccup. Our best minds are working on it.
        </p>

        <a href="{% url 'index' %}" class="inline-flex items-center px-8 py-3 text-lg font-medium text-white transition-all duration-300 ease-in-out transform bg-red-600 rounded-full hover:bg-red-700 hover:scale-105 hover:shadow-[0_0_20px_rgba(239,68,68,0.5)] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 animate-fade-in-up" style="animation-delay: 0.4s;">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
            </svg>
            Return Home
        </a>
    </div>
</div>

<style>
    @keyframes glitch {
        0% { text-shadow: 2px 2px #ef4444, -2px -2px #3b82f6; transform: translate(0); }
        20% { text-shadow: -2px 2px #ef4444, 2px -2px #3b82f6; transform: translate(-2px, 2px); }
        40% { text-shadow: 2px -2px #ef4444, -2px 2px #3b82f6; transform: translate(2px, -2px); }
        60% { text-shadow: -2px -2px #ef4444, 2px 2px #3b82f6; transform: translate(-2px, -2px); }
        80% { text-shadow: 2px 2px #ef4444, -2px -2px #3b82f6; transform: translate(2px, 2px); }
        100% { text-shadow: -2px 2px #ef4444, 2px -2px #3b82f6; transform: translate(0); }
    }
    .animate-glitch {
        animation: glitch 1.5s infinite;
    }
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
        animation: fadeInUp 0.8s ease-out forwards;
        opacity: 0;
    }
</style>
{% endblock %}
