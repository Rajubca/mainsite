{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - 404</title>
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
    <link href="{% static 'css/tailwind.css' %}" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f172a; /* Parchment dark */
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
        }

        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80vw;
            height: 80vw;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(59, 130, 246, 0.05) 0%, rgba(15, 23, 42, 0) 70%);
            animation: breathe 8s ease-in-out infinite alternate;
            z-index: -2;
            pointer-events: none;
        }

        @keyframes breathe {
            0% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Animated Site Name Watermark */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Cormorant Garamond', serif;
            font-size: 25vw;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.02);
            white-space: nowrap;
            pointer-events: none;
            z-index: -1;
            user-select: none;
            animation: watermarkDrift 20s ease-in-out infinite alternate;
        }

        @keyframes watermarkDrift {
            0% { transform: translate(-50%, -45%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -55%) scale(1.05); opacity: 1; }
        }

        .serif-text {
            font-family: 'Cormorant Garamond', serif;
        }

        .error-code {
            font-size: 10rem;
            font-weight: 300;
            color: #3b82f6; /* Sepia/Accent blue */
            line-height: 1;
            opacity: 0.8;
            letter-spacing: -0.05em;
        }

        .divider {
            width: 40px;
            height: 1px;
            background-color: #eab308; /* Forest/Gold */
            margin: 2rem auto;
            opacity: 0.5;
        }

        .btn-refined {
            border: 1px solid rgba(248, 250, 252, 0.2);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            background: transparent;
        }

        .btn-refined:hover {
            border-color: #eab308;
            color: #eab308;
            background: rgba(234, 179, 8, 0.05);
            transform: translateY(-2px);
        }

        .fade-in-up {
            opacity: 0;
            animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center relative">

    <div class="ambient-glow"></div>
    <div class="watermark">Shiva Services</div>

    <div class="relative z-10 text-center px-6 max-w-2xl">
        <h1 class="error-code serif-text fade-in-up" style="animation-delay: 0.1s;">404</h1>

        <div class="divider fade-in-up" style="animation-delay: 0.3s;"></div>

        <h2 class="text-3xl font-light mb-4 serif-text tracking-wide fade-in-up" style="animation-delay: 0.5s;">
            Page Not Found
        </h2>

        <p class="text-lg text-slate-400 font-light mb-10 leading-relaxed fade-in-up" style="animation-delay: 0.7s;">
            The content you are seeking does not exist or has been moved. <br>Please verify the address or return to the beginning.
        </p>

        <a href="{% url 'index' %}" class="inline-flex items-center px-8 py-3 text-sm tracking-widest uppercase font-medium text-slate-300 rounded-sm btn-refined fade-in-up" style="animation-delay: 0.9s;">
            Return to Origin
        </a>
    </div>

</body>
</html>
