{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SHIVA | Page Not Found</title>
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">

    <!-- Fonts matching the journal -->
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;700&display=swap" rel="stylesheet"/>
    <link href="{% static 'css/tailwind.css' %}" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0b1120;
            --accent-gold: #eab308;
            --text-ink: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-ink);
            font-family: 'Crimson Pro', serif;
            overflow: hidden; /* Prevent scrolling on error pages */
        }

        /* Editorial Typography */
        .font-cormorant { font-family: 'Cormorant Garamond', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }

        .huge-number {
            font-size: clamp(8rem, 25vw, 20rem);
            line-height: 0.8;
            font-weight: 300;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.1);
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(255,255,255,0.1));
            -webkit-background-clip: text;
            background-clip: text;
            user-select: none;
        }

        /* The vertical spine watermark */
        .spine-text {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%) rotate(90deg);
            transform-origin: right center;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            letter-spacing: 0.5em;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Golden Divider Line */
        .vertical-divider {
            width: 1px;
            background: linear-gradient(to bottom, transparent, var(--accent-gold), transparent);
            opacity: 0.5;
        }

        /* Button styling matching the theme */
        .journal-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            padding: 0.75rem 2rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent-gold);
            background: transparent;
            border: 1px solid rgba(234, 179, 8, 0.3);
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .journal-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--accent-gold);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        .journal-btn:hover {
            color: var(--bg-color);
            border-color: var(--accent-gold);
        }

        .journal-btn:hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        /* Entrance Animations */
        .fade-in-element {
            opacity: 0;
            transform: translateY(20px);
            animation: journalFadeIn 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes journalFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center relative">

    <!-- Subtle atmospheric light behind content -->
    <div class="absolute inset-0 z-0 bg-[radial-gradient(circle_at_30%_50%,rgba(59,130,246,0.03),transparent_50%)] pointer-events-none"></div>

    <!-- Editorial Spine Watermark -->
    <div class="spine-text">SHIVA SERVICES — ERROR 404</div>

    <div class="relative z-10 w-full max-w-7xl mx-auto px-8 md:px-16 flex flex-col md:flex-row items-center justify-center gap-12 md:gap-24">

        <!-- Left Side: Architectural Typography -->
        <div class="flex-shrink-0 fade-in-element" style="animation-delay: 0.2s;">
            <h1 class="huge-number font-cormorant tracking-tighter">404</h1>
        </div>

        <!-- Center: Vertical Divider (hidden on mobile) -->
        <div class="hidden md:block h-64 vertical-divider fade-in-element" style="animation-delay: 0.4s;"></div>

        <!-- Right Side: Editorial Content -->
        <div class="max-w-lg text-center md:text-left">
            <h2 class="text-3xl md:text-4xl lg:text-5xl font-light mb-6 font-cormorant italic fade-in-element" style="animation-delay: 0.6s;">
                Lost in the Archive
            </h2>

            <p class="text-lg md:text-xl text-slate-400 mb-10 leading-relaxed font-light fade-in-element" style="animation-delay: 0.8s;">
                The curatorial path you are attempting to follow does not exist within our current volumes. The page may have been moved, or perhaps never existed.
            </p>

            <div class="fade-in-element" style="animation-delay: 1.0s;">
                <a href="{% url 'index' %}" class="journal-btn">
                    Return to Journal
                </a>
            </div>
        </div>

    </div>

</body>
</html>
