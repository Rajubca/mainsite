{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SHIVA | Page Not Found</title>
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">

    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;700&display=swap" rel="stylesheet"/>
    <link href="{% static 'css/tailwind.css' %}" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0b1120;
            --accent-gold: #eab308;
            --text-ink: #f8fafc;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-ink);
            font-family: 'Crimson Pro', serif;
            overflow: hidden;
        }

        .font-cormorant { font-family: 'Cormorant Garamond', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }

        .site-name {
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 2rem;
        }

        .huge-number {
            font-size: clamp(6rem, 20vw, 15rem);
            line-height: 1;
            font-weight: 300;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.1);
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(255,255,255,0.1));
            -webkit-background-clip: text;
            background-clip: text;
            user-select: none;
            margin: 0 auto;
        }

        .horizontal-divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--accent-gold), transparent);
            margin: 2rem auto;
            opacity: 0.5;
        }

        .journal-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 2.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent-gold);
            background: transparent;
            border: 1px solid rgba(234, 179, 8, 0.3);
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .journal-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--accent-gold);
            transform: scaleX(0);
            transform-origin: center;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        .journal-btn:hover {
            color: var(--bg-color);
            border-color: var(--accent-gold);
        }

        .journal-btn:hover::before {
            transform: scaleX(1);
        }

        .fade-in-element {
            opacity: 0;
            transform: translateY(20px);
            animation: journalFadeIn 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes journalFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Central Animated Watermark */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Cormorant Garamond', serif;
            font-size: 20vw;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.015);
            white-space: nowrap;
            pointer-events: none;
            z-index: 0;
            user-select: none;
            animation: watermarkPulse 15s ease-in-out infinite alternate;
        }

        @keyframes watermarkPulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1.02); opacity: 1; }
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center relative">

    <div class="absolute inset-0 z-0 bg-[radial-gradient(circle_at_50%_50%,rgba(59,130,246,0.03),transparent_60%)] pointer-events-none"></div>

    <div class="watermark">SHIVA SERVICES</div>

    <div class="relative z-10 w-full max-w-3xl mx-auto px-6 text-center flex flex-col items-center justify-center">

        <div class="site-name fade-in-element" style="animation-delay: 0.1s;">
            Shiva Services
        </div>

        <div class="fade-in-element" style="animation-delay: 0.3s;">
            <h1 class="huge-number font-cormorant tracking-tighter">404</h1>
        </div>

        <div class="horizontal-divider fade-in-element" style="animation-delay: 0.5s;"></div>

        <h2 class="text-3xl md:text-4xl lg:text-5xl font-light mb-6 font-cormorant italic fade-in-element" style="animation-delay: 0.7s;">
            Lost in the Archive
        </h2>

        <p class="text-lg md:text-xl text-slate-400 mb-10 leading-relaxed font-light fade-in-element max-w-xl mx-auto" style="animation-delay: 0.9s;">
            The curatorial path you are attempting to follow does not exist within our current volumes. The page may have been moved, or perhaps never existed.
        </p>

        <div class="fade-in-element" style="animation-delay: 1.1s;">
            <a href="{% url 'index' %}" class="journal-btn">
                Return to Journal
            </a>
        </div>

    </div>

</body>
</html>
