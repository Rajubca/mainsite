{% extends 'base.html' %}
{% load static %}

{% block title %}Page Not Found - 404{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex flex-col items-center justify-center text-center px-4">
    <div class="relative">
        <h1 class="text-9xl font-bold text-gray-800 dark:text-gray-100 animate-pulse tracking-widest relative z-10" style="text-shadow: 0 0 20px rgba(99, 102, 241, 0.4);">
            4<span class="inline-block animate-bounce text-indigo-500">0</span>4
        </h1>
        <div class="absolute -inset-10 bg-indigo-500/20 blur-3xl rounded-full mix-blend-multiply dark:mix-blend-screen opacity-50 animate-blob"></div>
    </div>

    <div class="mt-8 z-10">
        <h2 class="text-3xl font-semibold text-gray-700 dark:text-gray-300 mb-4 animate-fade-in-up">Lost in the Void</h2>
        <p class="text-lg text-gray-500 dark:text-gray-400 mb-8 max-w-md mx-auto animate-fade-in-up" style="animation-delay: 0.2s;">
            The page you are looking for has vanished into the digital ether. Let's get you back to familiar territory.
        </p>

        <a href="{% url 'index' %}" class="inline-flex items-center px-8 py-3 text-lg font-medium text-white transition-all duration-300 ease-in-out transform bg-indigo-600 rounded-full hover:bg-indigo-700 hover:scale-105 hover:shadow-[0_0_20px_rgba(79,70,229,0.5)] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 animate-fade-in-up" style="animation-delay: 0.4s;">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
            </svg>
            Return Home
        </a>
    </div>
</div>

<style>
    @keyframes blob {
        0% { transform: translate(0px, 0px) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
        100% { transform: translate(0px, 0px) scale(1); }
    }
    .animate-blob {
        animation: blob 7s infinite;
    }
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
        animation: fadeInUp 0.8s ease-out forwards;
        opacity: 0;
    }
</style>
{% endblock %}
