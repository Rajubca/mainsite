{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}SHIVA | A Curated Journal of Excellence - The M Path{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&amp;family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&amp;family=Inter:wght@300;400;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'serif'],
                        journal: ['Crimson Pro', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        parchment: '#0f172a',
                        sepia: '#3b82f6',
                        forest: '#eab308',
                        ink: '#f8fafc',
                        muted: '#1e293b',
                    }
                }
            }
        }
    </script>
    <link href="{% static 'journal/css/journal1.css' %}" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    {% block extra_head %}{% endblock %}
</head>
<body class="antialiased selection:bg-forest selection:text-white">

    {% block content %}
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="{% static 'journal/js/journal1.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
